<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HTML Forms</h1>
    <p>
        <label for="">Full Name</label>
        <input type="text">
    </p>

    <p>
        <label for="">Age</label>
        <input type="number">
    </p>

    <p>
        <label for="">Email</label>
        <input type="email">
    </p>
    <p>
        <label for="">Mobile Number</label>
        <input type="tel">
    </p>

    <p>
        <label for="">Password</label>
        <input type="password">
    </p>

    <p>
        <label for="">Upload your photo</label>
        <input type="file">
    </p>

    <p>
        <label for="">Date of birth</label>
        <input type="date">
    </p>
    <p>
        <label for="">Time</label>
        <input type="time">
    </p>

    <p>
        <label for="">Date Time</label>
        <input type="datetime-local">
    </p>

    <p>
        <label for="">Favourite Color</label>
        <input type="color">
    </p>

    <p>
        <label for="">Gender</label>
    
        <label for="rb_male">Male</label>
        <input type="radio" id="rb_male" name="gender">
    
        <label for="rb_female">Female</label>
        <input type="radio" id="rb_female" name="gender">
    </p>

    <p>
        <label for="">Select your city</label>
        <select name="" id="" multiple>
            <option value="">Solapur</option>
            <option value="">Mumbai</option>
            <option value="">Pune</option>
            <option value="">Bengaluru</option>
            <option value="">Hyderabad</option>
            <option value="">Delhi</option>
        </select>
    </p>
</body>
</html>
