<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,th,td{
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        table{
            margin: 16px;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>City</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Alex</td>
                <td rowspan="2">Paris</td>
                <td>85</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Alexa</td>
                <td>97</td>
            </tr>
            <tr>
                <td>103</td>
                <td>George</td>
                <td>London</td>
                <td>91</td>
            </tr>
            <tr>
                <td>104</td>
                <td>Lita</td>
                <td>San Fransisco</td>
                <td>87</td>
            </tr>
            <tr>
                <td>105</td>
                <td>Lisa</td>
                <td>Hongkong</td>
                <td>94</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4">Total 5 Students</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>

<!-- table -> to create a table in html
thead -> to create table header
tbody -> to display the data of the table
tr    -> to create a new row in the table
th    -> to create column heading in the table
td    -> to create a column value in the table -->
